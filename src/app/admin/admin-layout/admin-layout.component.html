<div class="flex h-screen bg-jichi-base overflow-hidden font-sans">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════ -->
  <aside class="w-64 flex-shrink-0 bg-jichi-dark flex flex-col overflow-hidden">

    <!-- Logo -->
    <div class="h-16 flex items-center px-6 border-b border-white/10 flex-shrink-0">
      <a routerLink="/" class="flex items-center gap-2.5 group">
        <svg class="w-7 h-7" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="#84CC16"/>
          <path d="M20 10v11c0 3.5-2.5 5.5-5.5 5.5S9 23.5 9 21"
                stroke="#262626" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="8" r="2.5" fill="#262626"/>
        </svg>
        <span class="text-white font-bold text-lg tracking-tight group-hover:text-jichi-accent transition-colors">
          jichi
        </span>
      </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-4 overflow-y-auto">
      <p class="text-white/25 text-[10px] font-bold uppercase tracking-widest px-7 mb-3">
        Operaciones
      </p>

      <!-- Dashboard -->
      <a routerLink="/admin/dashboard"
         routerLinkActive
         #rla1="routerLinkActive"
         [class]="linkClass(rla1.isActive)">
        <div [class]="iconBg(rla1.isActive)">
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2"/>
            <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/>
            <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2"/>
            <rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
          </svg>
        </div>
        <span class="text-sm font-medium">Dashboard</span>
      </a>

      <!-- Análisis por Barrios -->
      <a routerLink="/admin/barrios"
         routerLinkActive
         #rla2="routerLinkActive"
         [class]="linkClass(rla2.isActive)">
        <div [class]="iconBg(rla2.isActive)">
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="9" width="3" height="5.5" rx="0.8"/>
            <rect x="6.5" y="6" width="3" height="8.5" rx="0.8"/>
            <rect x="11.5" y="3" width="3" height="11.5" rx="0.8"/>
            <path d="M1.5 3.5l4-2.5 4 2.5 4-2.5"/>
          </svg>
        </div>
        <span class="text-sm font-medium">Análisis por Barrios</span>
      </a>

      <!-- Mapa de Calor -->
      <a routerLink="/admin/mapa"
         routerLinkActive
         #rla3="routerLinkActive"
         [class]="linkClass(rla3.isActive)">
        <div [class]="iconBg(rla3.isActive)">
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 1.5C5.52 1.5 3.5 3.52 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.48-2.02-4.5-4.5-4.5z"/>
            <circle cx="8" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="text-sm font-medium">Mapa de Calor</span>
      </a>

      <!-- Red de Sensores IoT -->
      <a routerLink="/admin/historial"
         routerLinkActive
         #rla4="routerLinkActive"
         [class]="linkClass(rla4.isActive)">
        <div [class]="iconBg(rla4.isActive)">
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13.5h.01"/>
            <path d="M5.3 11a3.8 3.8 0 015.4 0"/>
            <path d="M2.6 8.3a7.5 7.5 0 0110.8 0"/>
            <path d="M0 5.5a11.2 11.2 0 0116 0"/>
          </svg>
        </div>
        <span class="text-sm font-medium">Red de Sensores IoT</span>
      </a>

      <!-- Usuarios -->


      <!-- Separator -->
      <div class="border-t border-white/10 mx-6 my-4"></div>

      <!-- Ir al Inicio -->
      <a routerLink="/"
         class="flex items-center gap-3 px-4 py-2.5 rounded-xl mx-3 transition-all duration-150
                text-white/40 hover:text-white/70 hover:bg-white/5 cursor-pointer">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-white/5 flex-shrink-0">
          <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 6l6-4.5L14 6v8a1 1 0 01-1 1H3a1 1 0 01-1-1V6z"/>
            <path d="M6 15V9h4v6"/>
          </svg>
        </div>
        <span class="text-sm font-medium">Ir al Inicio</span>
      </a>
    </nav>

    <!-- User + Logout -->
    <div class="p-4 border-t border-white/10 flex-shrink-0">
      <div class="flex items-center gap-3 px-2 py-2">
        <!-- Avatar initials -->
        <div class="w-8 h-8 rounded-full bg-jichi-accent flex items-center justify-center flex-shrink-0">
          <span class="text-jichi-dark text-xs font-bold">{{ adminInitials }}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white text-xs font-semibold truncate">{{ adminEmail }}</p>
          <p class="text-white/40 text-[10px]">Administrador</p>
        </div>
        <!-- Logout button -->
        <button (click)="logout()"
                title="Cerrar Sesión"
                class="text-white/40 hover:text-red-400 transition-colors p-1 rounded-lg hover:bg-white/5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>

  </aside>


  <!-- ═══════════════════════════════════════════
       MAIN AREA
       ═══════════════════════════════════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Header -->
    <header class="h-16 bg-jichi-base border-b border-jichi-gray flex items-center
                   px-6 justify-between flex-shrink-0">
      <!-- Breadcrumb placeholder -->
      <div class="flex items-center gap-2 text-sm text-jichi-muted">
        <span class="font-medium text-jichi-dark">Panel Administrativo</span>
        <span class="text-jichi-gray">·</span>
        <span>Jichi SSD</span>
      </div>

      <!-- Right: user badge -->
      <div class="flex items-center gap-3">
        <div class="hidden sm:flex items-center gap-2 bg-jichi-accent/10 border border-jichi-accent/25
                    rounded-full px-3 py-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-jichi-accent animate-pulse"></span>
          <span class="text-jichi-dark text-xs font-semibold">Sistema Activo</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-jichi-dark flex items-center justify-center">
          <span class="text-jichi-base text-xs font-bold">{{ adminInitials }}</span>
        </div>
      </div>
    </header>

    <!-- Scrollable content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet/>
    </main>

  </div>
</div>
